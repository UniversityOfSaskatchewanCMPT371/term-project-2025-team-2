<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DICOM Tag Editor</title>
    <script src="https://unpkg.com/dicom-parser@1.8.3/dist/dicomParser.min.js" defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .file-input {
            padding: 20px;
            border: 2px dashed #ccc;
            border-radius: 4px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }

        .tag-value {
            min-width: 100px;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="file-input">
            <input type="file" id="fileInput" accept=".dcm">
            <p>Drop a DICOM file or click to select</p>
        </div>
        <div class="actions">
            <button id="downloadBtn" disabled>Download Modified DICOM</button>
        </div>
        <div id="tagTable"></div>

    </div>

    <script>
        let dicomData = null;
        let modifiedTags = new Map();

        document.getElementById('fileInput').addEventListener('change', handleFileSelect);
        document.getElementById('downloadBtn').addEventListener('click', downloadModifiedDicom);

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                const arrayBuffer = e.target.result;
                try {
                    // Parse DICOM file
                    dicomData = dicomParser.parseDicom(new Uint8Array(arrayBuffer));
                    displayTags(dicomData);
                    document.getElementById('downloadBtn').disabled = false;
                } catch (error) {
                    alert('Error parsing DICOM file: ' + error.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function displayTags(dataset) {
            const tableDiv = document.getElementById('tagTable');
            let html = '<table><thead><tr><th>Tag</th><th>VR</th><th>Description</th><th>Value</th></tr></thead><tbody>';

            for (const tag in dataset.elements) {
                const element = dataset.elements[tag];
                const tagInfo = getTagInfo(tag);
                const value = dataset.string(tag) || '';

                html += `
                    <tr>
                        <td>${tag}</td>
                        <td>${element.vr || ''}</td>
                        <td>${tagInfo}</td>
                        <td>
                            <input type="text" 
                                class="tag-value" 
                                data-tag="${tag}" 
                                value="${value}"
                                onchange="updateTagValue(this)">
                        </td>
                    </tr>
                `;
            }

            html += '</tbody></table>';
            tableDiv.innerHTML = html;
        }

        function updateTagValue(input) {
            const tag = input.dataset.tag;
            const newValue = input.value;
            modifiedTags.set(tag, newValue);
        }

        function getTagInfo(tag) {
            // This is a simple tag dictionary - in practice, you'd want a more complete one
            const tagDict = {
                'x00100010': 'Patient Name',
                'x00100020': 'Patient ID',
                'x00100030': 'Patient Birth Date',
                'x00080060': 'Modality',
                'x00080070': 'Manufacturer',
                // Add more tags as needed
            };
            return tagDict[tag.toLowerCase()] || 'Unknown';
        }

        function downloadModifiedDicom() {
            if (!dicomData) return;

            // Create a modified copy of the original DICOM data
            const modifiedDataset = new Uint8Array(dicomData.byteArray);

            // Apply modifications
            modifiedTags.forEach((newValue, tag) => {
                const element = dicomData.elements[tag];
                console.log(element);
                if (element) {
                    // This is a simplified approach - in practice, you'd need proper VR handling
                    const encoder = new TextEncoder();
                    const valueBytes = encoder.encode(newValue);
                    valueBytes.forEach((byte, index) => {
                        console.log(byte);
                        if (index < element.length) {
                            modifiedDataset[element.dataOffset + index] = byte;
                        }
                    });
                }
            });

            // Create and trigger download
            console.log(modifiedDataset[364]);
            console.log(dicomData.byteArray[365]);
            const blob = new Blob([modifiedDataset], { type: 'application/dicom' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'modified.dcm';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>

</html>
